syntax = "proto3";

package goconnect;

option go_package = "github.com/mkloubert/go-connect/pb";

message Envelope {
  oneof payload {
    Handshake handshake = 1;
    Register register = 2;
    RegisterAck register_ack = 3;
    ConnectRequest connect_request = 4;
    ConnectAck connect_ack = 5;
    OpenStream open_stream = 6;
    OpenStreamAck open_stream_ack = 7;
    Data data = 8;
    CloseStream close_stream = 9;
    Heartbeat heartbeat = 10;
    Disconnect disconnect = 11;
    ErrorMsg error_msg = 12;
  }
}

message Handshake {
  bytes public_key = 1;
}

message Register {
  string connection_id = 1;
}

message RegisterAck {
  bool success = 1;
  string message = 2;
}

message ConnectRequest {
  string connection_id = 1;
}

message ConnectAck {
  bool success = 1;
  string message = 2;
}

message OpenStream {
  uint32 stream_id = 1;
}

message OpenStreamAck {
  uint32 stream_id = 1;
  bool success = 2;
  string message = 3;
}

message Data {
  uint32 stream_id = 1;
  bytes payload = 2;
}

message CloseStream {
  uint32 stream_id = 1;
}

message Heartbeat {}

message Disconnect {
  string reason = 1;
}

message ErrorMsg {
  string message = 1;
}
